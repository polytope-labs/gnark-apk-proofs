name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.25.7"
  FOUNDRY_PROFILE: ci

jobs:
  go-circuits:
    name: Go circuits
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: circuits/go.sum

      - name: Build
        working-directory: circuits
        run: go build ./...

      - name: Test (BLS circuit checks)
        working-directory: circuits
        run: go test -v -timeout 20m -run "TestCircuitCompiles|TestSimpleBLSG1ApkCircuit" ./apk/

  solidity:
    name: Solidity verifiers
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Run Foundry tests
        working-directory: solidity
        run: forge test -vvv

  rust:
    name: Rust prover
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: circuits/go.sum

      - uses: dtolnay/rust-toolchain@stable

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test

      - name: Check formatting
        run: cargo +nightly fmt --check

      - name: Clippy
        run: cargo +stable clippy -- -D warnings

  rust-e2e:
    name: Rust e2e (prove + verify)
    runs-on: ubuntu-latest
    timeout-minutes: 240
    needs: rust
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: circuits/go.sum

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Cache KZG SRS
        uses: actions/cache@v4
        with:
          path: ~/.config/gnark-apk-proofs/srs
          key: plonk-srs-power23

      - name: Prove and verify (PLONK)
        run: cargo test -p gnark-plonk-verifier --test verify_proof -- --ignored --nocapture
